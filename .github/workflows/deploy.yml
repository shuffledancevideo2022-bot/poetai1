name: Deploy PoetAI to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
    - run: corepack enable  # Для новых deps
    - run: npm ci
    - run: npm run build
      env:
        VITE_BASE: '/poetai1/'
    - uses: actions/upload-pages-artifact@v3
      with:
        path: ./dist
    - name: Verify dist
      run: ls -la dist/  # Лог для дебага

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - id: deployment
      uses: actions/deploy-pages@v4
